name: rtt-grpo
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - git
  - setuptools>=77.0.3,<80
  - wheel
  - ninja
  - pytorch
  - torchvision
  - pytorch-cuda=12.4
  - pip:
      # Core runtime shared by GRPO training and post-train teacher eval.
      - pyyaml>=6.0.1
      - numpy>=1.26.0
      - tqdm>=4.66.0
      - huggingface-hub>=0.25.0
      - datasets>=2.20.0
      - sentencepiece>=0.2,<1
      - protobuf>=4.25,<6
      - pillow>=10
      - tokenizers>=0.21
      - safetensors>=0.4
      - accelerate>=1.1
      - peft>=0.18
      - trl==0.29.1
      - deepspeed>=0.15
      - pysqlite3-binary
      - transformers @ git+https://github.com/huggingface/transformers.git@main
      - vllm
